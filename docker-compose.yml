# =============================================================================
# AWBotNest 平台 docker-compose
# 默认 SQLite（config.DB_INFO.dbset=SQLite），无需额外数据库容器。
# 如需 MySQL，取消下方 mysql 服务注释，并把 config.py 的 DB_INFO 改为 mySQL。
# =============================================================================
services:
  awbotnest:
    image: awdress/awbotnest:latest
    container_name: AWBotNest
    working_dir: /app
    restart: always

    volumes:
      # 注意：config/ 只放代码（config.py 垫片），不映射，随镜像走。
      - ./plugins:/app/plugins        # 插件目录（上传/导入的插件持久化）
      - ./logs:/app/logs
      - ./sessions:/app/sessions      # Telegram 会话
      - ./db_file:/app/db_file        # SQLite 数据库
      - ./data:/app/data              # 运行时数据：config.json/state.toml/插件KV/plugins_state.json

    environment:
      - TZ=Asia/Shanghai
      # 如需代理可在此设置
      # - http_proxy=http://host:port
      # - https_proxy=http://host:port

    ports:
      - '18001:18001'                 # Web 控制台（与 config.WEB_UI_PORT 对齐）

  # ── 可选：MySQL（默认用 SQLite，不需要）──
