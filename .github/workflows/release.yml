# =============================================================================
# 版本发布（Release）
# 触发：推送形如 v1.0.0 的 tag
# 动作：
# 1) 构建多阶段镜像，推送到 Docker Hub，打上版本号系列标签（vX.Y.Z / latest）
# 2) 创建 GitHub Release，自动生成更新日志（与上一个 tag 的提交差异）
# =============================================================================
name: release

on:
  push:
    tags:
      - 'v*.*.*'        # 例：v1.0.0

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # 创建 Release 需要

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # 取全部历史，便于生成 changelog

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # 只需两个固定标签（vX.Y.Z 与 latest），用 shell 直接算即可。
      # 不再用 docker/metadata-action：它会额外调 GitHub API 拉仓库信息来生成标签，
      # GitHub API 偶发 500 时整个发布会挂；自己算标签没有这个外部依赖，也更快。
      - name: 生成镜像标签与元数据
        id: meta
        env:
          IMAGE: docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/awbotnest
          VER: ${{ github.ref_name }}          # 形如 v1.0.9
        run: |
          CREATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          {
            echo "tags<<__EOF__"
            echo "${IMAGE}:${VER}"
            echo "${IMAGE}:latest"
            echo "__EOF__"
            echo "labels<<__EOF__"
            echo "org.opencontainers.image.title=awbotnest"
            echo "org.opencontainers.image.version=${VER}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.created=${CREATED}"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: 构建并推送版本镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 从 CHANGELOG 提取本版本更新日志
        run: |
          VER="${{ github.ref_name }}"           # 形如 v1.0.0
          # 提取 CHANGELOG.md 中 "## v1.0.0" 到下一个 "## " 之间的内容
          NOTES=$(awk -v ver="## $VER" '
            $0 == ver {flag=1; next}
            /^## / && flag {flag=0}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="（本版本未在 CHANGELOG.md 中找到对应条目）"
          fi
          printf '%s\n' "$NOTES" > release_notes.md

      # 创建 Release 必须调 GitHub API，没法像镜像标签那样绕开；GitHub API 偶发 500 时
      # 单次调用就会挂。改用预装的 gh CLI + 重试循环：抖一下就重试，几次内基本能成。
      # 幂等：Release 已存在（比如上次跑到一半）就改内容，不存在才新建。
      # 顺带去掉了第三方 Node action（softprops/action-gh-release），少一个 Node 20 弃用警告。
      - name: 创建 GitHub Release（带重试，抵御 GitHub API 偶发 500）
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ github.ref_name }}"
          publish() {
            if gh release view "$VER" >/dev/null 2>&1; then
              gh release edit "$VER" --title "$VER" --notes-file release_notes.md
            else
              gh release create "$VER" --title "$VER" --notes-file release_notes.md
            fi
          }
          for i in 1 2 3 4 5; do
            if publish; then
              echo "Release 发布成功（第 $i 次尝试）"
              exit 0
            fi
            echo "第 $i 次发布 Release 失败（可能是 GitHub API 抖动），15 秒后重试…"
            sleep 15
          done
          echo "重试多次后仍失败，放弃"
          exit 1
