# =============================================================================
# 版本发布（Release）
#   触发：推送形如 v1.0.0 的 tag
#   动作：
#     1) 构建多阶段镜像，推送到 Docker Hub，打上版本号系列标签（vX.Y.Z / X.Y / latest）
#     2) 创建 GitHub Release，自动生成更新日志（与上一个 tag 的提交差异）
# =============================================================================
name: release

on:
  push:
    tags:
      - 'v*.*.*'        # 例：v1.0.0

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # 创建 Release 需要

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # 取全部历史，便于生成 changelog

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: 生成镜像标签与元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 镜像名 = Docker Hub 用户名/awbotnest（用户名与令牌均存于 Secrets）
          images: docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/awbotnest
          tags: |
            # 完整版本号：v1.0.0
            type=semver,pattern=v{{version}}
            # 主次版本：v1.0
            type=semver,pattern=v{{major}}.{{minor}}
            # 发布即最新
            type=raw,value=latest

      - name: 构建并推送版本镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true     # 自动汇总自上个 tag 以来的提交/PR
          draft: false
          prerelease: false
          body: |
            ## AWBotNest ${{ github.ref_name }}

            ### 🐳 Docker 镜像
            ```bash
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/awbotnest:${{ github.ref_name }}
            # 或使用 latest
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/awbotnest:latest
            ```

            ### 更新内容
            （以下为自动生成的提交记录）
