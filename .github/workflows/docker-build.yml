# =============================================================================
# Docker 构建校验（CI）
# - push 到 main：只构建镜像验证 Dockerfile 可用，【不推送】到 Docker Hub
# - 镜像发布（vX.Y.Z / latest）只由 release.yml 在打 tag 时负责
#   这样 Docker Hub 只有版本号标签 + latest，不会有一堆 sha- 标签。
# =============================================================================
name: docker-build

on:
  push:
    branches:
      - main
    paths:
      # 仅在影响镜像的文件变动时构建，文档/纯文案改动不触发
      - 'Dockerfile'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '**/*.py'
      - 'webui/frontend/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

# 同一分支的新提交取消尚在跑的旧构建，省额度
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建镜像（仅验证，不推送）
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: awbotnest:ci
          # 用 GitHub Actions 缓存加速重复构建
          cache-from: type=gha
          cache-to: type=gha,mode=max
